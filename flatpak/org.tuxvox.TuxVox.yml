app-id: org.tuxvox.TuxVox
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: tuxvox

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.RemoteDesktop

modules:
  - name: tuxvox
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app
        --extra-index-url https://download.pytorch.org/whl/cpu
        -r requirements.txt
      - pip3 install --no-build-isolation --prefix=/app .
      - install -Dm644 data/org.tuxvox.TuxVox.desktop
        /app/share/applications/org.tuxvox.TuxVox.desktop
      - install -Dm644 data/org.tuxvox.TuxVox.metainfo.xml
        /app/share/metainfo/org.tuxvox.TuxVox.metainfo.xml
      - install -Dm644 data/org.tuxvox.TuxVox.svg
        /app/share/icons/hicolor/scalable/apps/org.tuxvox.TuxVox.svg
    sources:
      - type: dir
        path: ..
